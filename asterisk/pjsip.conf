[global]
type=global
user_agent=BuildingIntercom

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

[transport-tcp]
type=transport
protocol=tcp
bind=0.0.0.0:5060

; South entrance panel
[south_panel]
type=endpoint
context=building
disallow=all
allow=ulaw
allow=alaw
auth=south_panel
aors=south_panel
direct_media=no

[south_panel]
type=auth
auth_type=userpass
username=south_panel
password=${PANEL_PASSWORD}

[south_panel]
type=aor
max_contacts=1

; Test extension - your SIP app
[9000]
type=endpoint
context=building
disallow=all
allow=ulaw
allow=alaw
auth=9000
aors=9000
direct_media=no

[9000]
type=auth
auth_type=userpass
username=9000
password=${TEST_PASSWORD}

[9000]
type=aor
max_contacts=2
qualify_frequency=30
