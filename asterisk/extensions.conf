[general]
static=yes
writeprotect=no

[building]
; Visitor dials apartment number → notify HA → ring apartment
exten => _1XX,1,NoOp(Doorbell from south entrance to apartment ${EXTEN})
 same => n,Set(CURLOPT(httpheader)=Content-Type: application/json)
 same => n,Set(RESULT=${CURL(http://127.0.0.1:8123/api/webhook/doorbell_south,{"apartment":"${EXTEN}","camera":"south_panel"})})
 same => n,Dial(PJSIP/${EXTEN},30)
 same => n,Hangup()

; Test extension
exten => 9000,1,Dial(PJSIP/9000,30)
 same => n,Hangup()
